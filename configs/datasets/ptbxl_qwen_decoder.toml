DEBUG = false

task = "classification"
model = "medtsllm"

# Qwen-enhanced PTB-XL classification config. Based on decoder-only PTB-XL config.
history_len = 512
pred_len = 512


[data]
dataset = "PTB-XL-Qwen"
mode = "multivariate"
cols = "all"
normalize = true
step = 512


[training]
epochs = 20
batch_size = 8
optimizer = "adam"
learning_rate = 1e-4
dropout = 0.1
loss = "ce"

eval_metric = "accuracy"
eval_metric_direction = "max"


[datasets.PTB-XL-Qwen]
# Base PTB-XL setting used by the inherited PTBXLClassificationDataset.
version = "v1"

# Folder layout expected:
#   data/ptbxl_images/train/manifest.csv
#   data/ptbxl_images/train/descriptions.csv
#   data/ptbxl_images/val/manifest.csv
#   data/ptbxl_images/val/descriptions.csv
#   data/ptbxl_images/test/manifest.csv
#   data/ptbxl_images/test/descriptions.csv
qwen_descriptions_dir = "data/ptbxl_images"

# append = patient info + Qwen ECG findings
# replace = Qwen ECG findings only
merge_mode = "append"

# The VLM Impression is the most diagnosis-like and most likely to be wrong.
# Dropping it keeps more objective ECG observations and reduces label-noise.
drop_sections = ["Impression"]
# Leave unset/empty unless you want to keep only selected sections.
# Example: keep_sections = ["Rhythm/Rate", "Intervals", "QRS/R-wave progression", "ST-T"]

# Prevent long VLM text from dominating the signal pathway.
max_chars = 1024
# Train-only stochastic fallback to patient-info-only text.
# Eval always uses the filtered Qwen text.
desc_dropout = 0.5
dropout_seed = 0


[models.medtsllm]
d_model = 32
d_ff = 128
n_heads = 8
num_tokens = 2048
# concatenation preserves inter-lead relationships (good for 12-lead ECG).
covariate_mode = "concat"
embedding_downsample_mode = "linear"

[models.medtsllm.patching]
patch_len = 32
stride = 16

[models.medtsllm.prompting]
input_stats_dim = 0
input_stats_select = "all"
dataset = true
task = true
clip = true          # patient-specific info (age/sex as JSON) -- the paper's biggest single gain
input_stats = false
examples = false     # required: build_prompt() reads cfg.examples directly

# --- Legacy: inject class descriptions as input text (does NOT reproduce
# BiomedCoOp; kept only for ablation). Off by default. ---
class_prompts = false
class_prompts_path = ""
class_prompts_per_class = 3
class_prompts_sample = true
class_codes = ["NORM", "MI", "STTC", "CD", "HYP"]

# --- BiomedCoOp prototype head (faithful mechanism) ---
# The class descriptions become the classifier (CLIP/CoOp style), with
# statistics-based prompt selection (SPS) + KDSP distillation.

# BiomedCoOp is intentionally not used.
# Qwen descriptions are appended as extra prompt text through [datasets.PTB-XL-Qwen].

[models.medtsllm.llm]
enabled = true
# decoder-only backbone (paper variant: MedTsLLM decoder-only on PTB-XL)
llm = "meta-llama/Llama-2-7b-hf"
load_in_4bit = false
load_in_8bit = false
llm_layers = -1


[setup]
seed = 0
device = "auto"
dtype = "mixed"
num_workers = "auto"
logger = "print"
