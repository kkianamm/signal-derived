DEBUG = false

task = "classification"
model = "medtsllm"

# Paper (Table III): Class.-PTB-XL  history=512  patch=32  stride=16
history_len = 512
pred_len = 512


[data]
dataset = "PTB-XL-Qwen"
mode = "multivariate"
cols = "all"
normalize = true
step = 512


[training]
epochs = 20
batch_size = 16
optimizer = "adam"
learning_rate = 1e-4
dropout = 0.1
loss = "ce"

eval_metric = "accuracy"
eval_metric_direction = "max"


[datasets.PTB-XL]
version = "v1"

# --- Qwen signal-derived descriptions: mitigations for the accuracy drop ---
# The raw merge hurt because the VLM report (esp. "Impression") is an
# unreliable, label-relevant text cue that the model over-trusts. These knobs
# make it net-positive (or at worst baseline). Set drop_sections=[],
# max_chars=0, desc_dropout=0.0 to reproduce the old raw-merge behavior.
[datasets.PTB-XL-Qwen]
version = "v1"
qwen_descriptions_dir = "data/ptbxl_images"
merge_mode = "append"                 # keep patient info, add Qwen text after it
drop_sections = ["Impression"]        # remove the VLM's (unreliable) diagnostic conclusion
# keep_sections = ["Rhythm/Rate", "Axis", "Intervals"]  # or whitelist only factual morphology
max_chars = 600                       # cap Qwen text so it can't swamp the signal (0 = no cap)
desc_dropout = 0.5                    # TRAIN-ONLY: drop Qwen text for 50% of samples (keeps signal strong)
dropout_seed = 0


[models.medtsllm]
d_model = 32
d_ff = 128
n_heads = 8
num_tokens = 1024
# concatenation preserves inter-lead relationships (good for 12-lead ECG).
covariate_mode = "concat"
embedding_downsample_mode = "linear"

[models.medtsllm.patching]
patch_len = 32
stride = 16

[models.medtsllm.prompting]
input_stats_dim = 0
input_stats_select = "all"
dataset = true
task = true
clip = true          # patient-specific info (age/sex as JSON) -- the paper's biggest single gain
input_stats = false
examples = false     # required: build_prompt() reads cfg.examples directly

[models.medtsllm.llm]
enabled = true
# decoder-only: meta-llama/Llama-2-7b-hf
# encoder-decoder (best for classification in the paper): google/flan-t5-xl
llm = "google/flan-t5-xl"
load_in_4bit = false
load_in_8bit = false
llm_layers = -1


[setup]
seed = 0
device = "auto"
dtype = "mixed"
num_workers = "auto"
logger = "print"
